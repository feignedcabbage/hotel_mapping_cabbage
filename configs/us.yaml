# Run config for the United States (US) subset (~1.34M raw rows, 13 providers).
country: US
default_phone_region: US

paths:
  raw_dir: data/raw/US
  output_dir: data/artifacts/runs

providers:
  - agoda
  - cleartrip
  - expedia
  - gogobal
  - grnc
  - hotelbeds
  - ioxl
  - ratehawk
  - restel
  - rezlive
  - tbo
  - tripjack
  - veturis

geo:
  h3_resolutions: [7, 8, 9]
  geohash_precisions: [5, 6, 7]
  # CONUS + Alaska + Hawaii + PR/USVI. Aleutian islands past the antimeridian
  # (positive lng) flag out_of_range — a handful of properties, flags not drops.
  lat_min: 17.5
  lat_max: 72.0
  lng_min: -180.0
  lng_max: -64.0
  min_decimal_places: 3

# US ZIP: 5 digits, optional +4 (normalized to ZIP5 so equality comparisons
# work). 5-digit runs collide with US street numbers ("12345 Main St"), so the
# address-text pattern is END-ANCHORED ('-' becomes ' ' in address_norm).
postal:
  field_pattern: "\\b([0-9]{5})(?:[- ][0-9]{4})?\\b"
  address_pattern: "\\b([0-9]{5})(?: [0-9]{4})?$"
  validation_pattern: "^[0-9]{5}$"

address_abbreviations:
  ave: avenue
  blvd: boulevard
  dr: drive
  ln: lane
  ct: court
  pl: place
  ste: suite
  fwy: freeway
  pkwy: parkway
  expy: expressway
  mt: mount
  ft: fort

tokens:
  min_token_length: 2
  # ~1.34M US rows; 0.005 ~= 6.7k records
  low_value_global_doc_freq_ratio: 0.005
  low_value_min_city_coverage: 20
  low_value_min_provider_coverage: 4
  rare_global_max_doc_freq: 2
  rare_global_min_length: 4
  rare_city_min_doc_freq: 2
  rare_city_max_doc_freq: 50
  rare_city_min_length: 4
  rare_city_max_cities: 50
  brand_candidate_min_chain_count: 30
  blocking_overcommon_ratio: 0.001
  blocking_min_token_length: 4
  match_global_overcommon_ratio: 0.01
  match_city_overcommon_ratio: 0.02
  match_city_overcommon_min_doc_freq: 20
  match_city_overcommon_min_provider_coverage: 4
  match_min_token_length: 4
  match_area_identity_keep_max_doc_freq: 200

manual_tokens:
  force_low_value:
    - hotel
    - hotels
    - room
    - rooms
    - stay
    - stays
    - the
    - and
  # Franchise variants ("Comfort Inn" vs "Comfort Suites") are frequently
  # co-located DIFFERENT properties: keep the type words in the core so name
  # signatures stay discriminative.
  force_keep:
    - inn
    - suites
    - motel
    - lodge
  # Modest curated franchise list; promote more from the generated
  # brand-candidate review queue after the first run. Deliberately NOT
  # including generic English words that double as brands (best, western,
  # days, super, red, roof, quality, comfort, holiday...) — separating those
  # would collapse franchise-variant names.
  brand_tokens:
    - marriott
    - hilton
    - hyatt
    - sheraton
    - westin
    - wyndham
    - ramada
    - radisson
    - hampton
    - doubletree
    - homewood
    - home2
    - courtyard
    - fairfield
    - springhill
    - towneplace
    - candlewood
    - staybridge
    - intercontinental
    - kimpton
    - crowne
    - econolodge
    - rodeway
    - clarion
    - mainstay
    - woodspring
    - microtel
    - baymont
    - travelodge
    - drury
    - omni
    - loews
    - sonesta
    - aloft
    - moxy
    - novotel
    - sofitel
    - fairmont
    - graduate
    - wingate
    - tru
  # DELIBERATELY minimal. In the US, area words (downtown/north/airport/beach)
  # ARE the identity of a franchise property ("Hilton Houston Downtown" vs
  # "Hilton Houston Midtown") — stripping them from the core would collapse
  # exactly the co-located properties that are hardest to tell apart.
  location_descriptors:
    - near
    - opposite
    - opp
    - "off"

reuse:
  phone_reuse_min: 5
  email_reuse_min: 5
  domain_reuse_min: 20
  top_n: 200

generic_email_locals:
  - info
  - reservation
  - reservations
  - booking
  - bookings
  - sales
  - contact
  - frontoffice
  - frontdesk
  - enquiry
  - enquiries
  - admin
  - support
  - stay
  - hotel
  - manager
  - gm

# OTA/aggregator/chain-portal domains — weak as identity signals. Chain-brand
# domains listed explicitly: they're shared by thousands of franchise
# properties and must never act as identity evidence.
weak_domains:
  - booking.com
  - agoda.com
  - expedia.com
  - tboholidays.com
  - tripadvisor.com
  - hotels.com
  - airbnb.com
  - cleartrip.com
  - worldota.net
  - grnconnect.com
  - travelocity.com
  - orbitz.com
  - priceline.com
  - trivago.com
  - kayak.com
  - reservations.com
  - guestreservations.com
  - getaroom.com
  - marriott.com
  - hilton.com
  - ihg.com
  - hyatt.com
  - wyndhamhotels.com
  - choicehotels.com
  - bestwestern.com
  - radissonhotels.com
  - accor.com
  - all.accor.com
  - sonesta.com
  - druryhotels.com
  - omnihotels.com
  - extendedstayamerica.com
  - redroof.com
  - motel6.com
  - myhgv.com
