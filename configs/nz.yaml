# Run config for the New Zealand (NZ) subset.
# NZ doubles as the small western canary before the big US run.
country: NZ
default_phone_region: NZ

paths:
  raw_dir: data/raw/NZ
  output_dir: data/artifacts/runs

# All 13 providers have NZ rows (restel only 5; gogobal non-empty here).
providers:
  - agoda
  - cleartrip
  - expedia
  - gogobal
  - grnc
  - hotelbeds
  - ioxl
  - ratehawk
  - restel
  - rezlive
  - tbo
  - tripjack
  - veturis

geo:
  h3_resolutions: [7, 8, 9]
  geohash_precisions: [5, 6, 7]
  # NZ mainland bbox with slack; Chatham Islands (lng ~ -176) intentionally flag
  # out_of_range (a handful of stays; flags are observable, not drops).
  lat_min: -48.5
  lat_max: -33.0
  lng_min: 165.0
  lng_max: 180.0
  min_decimal_places: 3

# NZ postcodes are 4 digits. 4-digit runs collide with street numbers, so the
# address-text pattern is END-ANCHORED. cleartrip leaks some UK rows (AB54 7XE);
# those simply fail to parse + get flagged by the bbox.
postal:
  field_pattern: "\\b([0-9]{4})\\b"
  address_pattern: "\\b([0-9]{4})$"
  validation_pattern: "^[0-9]{4}$"

address_abbreviations:
  ave: avenue
  blvd: boulevard
  dr: drive
  ln: lane
  ct: court
  pl: place
  tce: terrace
  mt: mount
  esp: esplanade

tokens:
  min_token_length: 2
  # ~58k NZ rows; 0.005 ~= 290 records
  low_value_global_doc_freq_ratio: 0.005
  low_value_min_city_coverage: 10
  low_value_min_provider_coverage: 4
  rare_global_max_doc_freq: 2
  rare_global_min_length: 4
  rare_city_min_doc_freq: 2
  rare_city_max_doc_freq: 50
  rare_city_min_length: 4
  rare_city_max_cities: 50
  brand_candidate_min_chain_count: 10
  blocking_overcommon_ratio: 0.001
  blocking_min_token_length: 4
  match_global_overcommon_ratio: 0.01
  match_city_overcommon_ratio: 0.02
  match_city_overcommon_min_doc_freq: 20
  match_city_overcommon_min_provider_coverage: 4
  match_min_token_length: 4
  match_area_identity_keep_max_doc_freq: 200

manual_tokens:
  force_low_value:
    - hotel
    - hotels
    - room
    - rooms
    - stay
    - stays
    - the
    - and
  # Western franchise reality: "X Inn" and "X Suites" are often DIFFERENT
  # co-located properties. Keep the type words in the core so signatures stay
  # discriminative (they're still excluded from match tokens by length/freq).
  force_keep:
    - inn
    - suites
    - motel
    - lodge
  brand_tokens:
    - scenic
    - millennium
    - copthorne
    - kingsgate
    - sudima
    - distinction
    - quest
    - rydges
    - ibis
    - novotel
    - sofitel
    - ramada
    - wyndham
    - hilton
    - marriott
    - radisson
    - asure
  # DELIBERATELY minimal — area words (central/cbd/waterfront/airport) are the
  # identity of NZ chain properties ("Scenic Hotel Auckland Central"); keep
  # them in the core.
  location_descriptors:
    - near
    - opposite
    - opp
    - "off"

reuse:
  phone_reuse_min: 5
  email_reuse_min: 5
  domain_reuse_min: 20
  top_n: 200

generic_email_locals:
  - info
  - reservation
  - reservations
  - booking
  - bookings
  - sales
  - contact
  - frontoffice
  - frontdesk
  - enquiry
  - enquiries
  - admin
  - support
  - stay
  - hotel
  - manager
  - gm

# OTA/aggregator/chain-portal domains — weak as identity signals. Chain domains
# are listed pre-emptively because small-country counts can sit under the
# domain_reuse_min auto-flag threshold.
weak_domains:
  - booking.com
  - agoda.com
  - expedia.com
  - expedia.co.nz
  - tboholidays.com
  - tripadvisor.com
  - hotels.com
  - airbnb.com
  - cleartrip.com
  - worldota.net
  - grnconnect.com
  - wotif.com
  - wotif.co.nz
  - bookabach.co.nz
  - travelocity.com
  - orbitz.com
  - priceline.com
  - trivago.com
  - marriott.com
  - hilton.com
  - ihg.com
  - hyatt.com
  - wyndhamhotels.com
  - choicehotels.com
  - bestwestern.com
  - radissonhotels.com
  - accor.com
  - all.accor.com
  - millenniumhotels.com
